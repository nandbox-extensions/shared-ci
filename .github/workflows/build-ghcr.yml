name: Build & Push to GHCR

on:
  workflow_call:
    inputs:
      image_tag:
        required: true
        type: string
    secrets:
      WEBHOOK_URL:
        required: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Checkout shared CI repo
        uses: actions/checkout@v3
        with:
          repository: nandbox-extensions/shared-ci
          path: shared-ci

      - name: Convert repository owner to lowercase
        run: echo "REPO_OWNER_LOWER=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Build & Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: shared-ci/Dockerfile
          push: true
          tags: ghcr.io/${{ env.REPO_OWNER_LOWER }}:${{ github.ref_name }}-${{ inputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
         
  notify:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Send POST to Webhook
        run: |
          curl -X POST ${{ secrets.WEBHOOK_URL }} \
            -H "Content-Type: application/json" \
            -d '{
              "bot_name": "${{ github.repository }}",
              "tag": "${{ github.ref_name }}-${{ inputs.image_tag }}"
            }'
